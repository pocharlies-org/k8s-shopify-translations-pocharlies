apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: translations-secrets
  namespace: skirmshop
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: translations-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract: { key: secret/skirmshop/translations }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translations-app
  namespace: skirmshop
spec:
  replicas: 1
  selector: { matchLabels: { app: translations-app } }
  template:
    metadata: { labels: { app: translations-app } }
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: harbor-pull
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: translations-app
          image: harbor.e-dani.com/homelab/shopify-translation-app@sha256:58b61fbf535765078af4d068f5f7aedb2819d09d62a18c4a510e9adb8246077c
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3458, hostPort: 3458, protocol: TCP }
          env:
            - { name: PORT, value: "3458" }
            - { name: NODE_ENV, value: "production" }
            - { name: DEV_MODE, value: "false" }
            - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/translations" }
            - { name: BRAIN_URL, value: "http://skirmshop-brain.skirmshop-brain-prod.svc.cluster.local" }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: shared-postgres-app, key: username } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: shared-postgres-app, key: password } }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/translations" }
            - name: SYNAPSE_DB_USER
              valueFrom: { secretKeyRef: { name: translations-secrets, key: SYNAPSE_DB_USER } }
            - name: SYNAPSE_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: translations-secrets, key: SYNAPSE_DB_PASSWORD } }
            - { name: SYNAPSE_DATABASE_URL, value: "postgresql://$(SYNAPSE_DB_USER):$(SYNAPSE_DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/synapse" }
            - name: _RMQUSER
              valueFrom: { secretKeyRef: { name: rabbitmq-secrets, key: RABBITMQ_DEFAULT_USER } }
            - name: _RMQPASS
              valueFrom: { secretKeyRef: { name: rabbitmq-secrets, key: RABBITMQ_DEFAULT_PASS } }
            - { name: SYNAPSE_AMQP_URL, value: "amqp://$(_RMQUSER):$(_RMQPASS)@shared-rabbitmq.databases.svc.cluster.local:5672/%2Fsynapse" }
          envFrom: [{ secretRef: { name: translations-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 768Mi }
          readinessProbe:
            tcpSocket: { port: 3458 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3458 }
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata: { name: translations-app, namespace: skirmshop }
spec:
  selector: { app: translations-app }
  ports: [{ name: http, port: 80, targetPort: 3458 }]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: skirmshop-translations-public
  namespace: skirmshop
  annotations:
    external-dns.alpha.kubernetes.io/hostname: skirmshop.e-dani.com
    external-dns.alpha.kubernetes.io/target: "57.129.17.172"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [websecure]
  ingressClassName: traefik-edge
  routes:
    - match: Host(`skirmshop.e-dani.com`) && PathPrefix(`/translations`)
      kind: Rule
      services:
        - name: translations-app
          port: 80
  tls:
    store: { name: default, namespace: traefik-edge }
