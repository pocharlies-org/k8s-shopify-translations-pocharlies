# namePrefix turns "secrets" into "translations-secrets" (matches the target
# secret the deployment reads via envFrom / secretKeyRef).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: secrets
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: translations-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract: { key: secret/skirmshop/translations }
