name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
    tags-ignore: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standard:
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-ci.yml@main
    with:
      runner: arc-k8s
      run_node: false
      run_docker_build: false
      kustomize_paths: ". k8s"
    secrets: inherit

  scopes:
    name: Verify Shopify scopes
    runs-on: arc-k8s
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL --retry 3 \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz \
            | tar xz -C "$RUNNER_TEMP/bin" kustomize
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Ensure pyyaml
        run: python3 -c "import yaml" 2>/dev/null || pip3 install --quiet pyyaml
      - name: Verify SCOPES match expected set
        run: ./scripts/verify-scopes.sh
